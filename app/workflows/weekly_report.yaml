name: Weekly Channel Report
description: Fetches channel stats, analyzes trends, and generates a report.
steps:
  - name: Get Channel Info
    action: fetch_channel
    params:
      channel_id: UCp6mySOpP-MrCRzMozlWUUQ
  - name: Fetch Latest Videos
    action: fetch_videos
    params:
      channel_id: UCp6mySOpP-MrCRzMozlWUUQ
      max_results: 20
  - name: Analyze Performance
    action: analyze_stats
  - name: Generate Niche Recommendations
    action: generate_recommendations
  - name: Generate Visual Report
    action: generate_report
  - name: Notify Team
    action: send_notification
    params:
      message: "Report generated for {channel_name}! Avg Views: {avg_views}"
